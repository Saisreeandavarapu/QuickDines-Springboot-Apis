spring.application.name=QuickDines

# application.properties

```properties
#########################################################
# APPLICATION CONFIGURATION
#########################################################



server.port=${PORT:8080}


#########################################################
# DATABASE CONFIGURATION
#########################################################

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC


#########################################################
# MYSQL CONNECTION POOL (HIKARI CP)
#########################################################

spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.max-lifetime=1800000


#########################################################
# JWT CONFIGURATION
#########################################################

jwt.secret=${JWT_SECRET}

# 24 Hours
jwt.expiration=86400000

# 7 Days
jwt.refresh-token.expiration=604800000


#########################################################
# SPRING SECURITY
#########################################################

spring.security.user.name=admin
spring.security.user.password=admin


#########################################################
# EMAIL CONFIGURATION
#########################################################

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000


#########################################################
# CLOUDINARY CONFIGURATION
#########################################################

cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api-key=${CLOUDINARY_API_KEY}
cloudinary.api-secret=${CLOUDINARY_API_SECRET}


#########################################################
# SWAGGER CONFIGURATION
#########################################################

springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true

springdoc.swagger-ui.path=/swagger-ui.html

springdoc.packages-to-scan=com.quickdine

springdoc.default-produces-media-type=application/json


#########################################################
# FILE UPLOAD CONFIGURATION
#########################################################

spring.servlet.multipart.enabled=true

spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=50MB


#########################################################
# WEBSOCKET CONFIGURATION
#########################################################

spring.websocket.message-size=8192


#########################################################
# ACTUATOR CONFIGURATION
#########################################################

management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always

management.info.env.enabled=true


#########################################################
# LOGGING CONFIGURATION
#########################################################

logging.level.root=INFO

logging.level.org.springframework.security=DEBUG

logging.level.org.hibernate.SQL=DEBUG

logging.level.com.quickdine=DEBUG


#########################################################
# OTP CONFIGURATION
#########################################################

otp.expiry.minutes=5

otp.length=6


#########################################################
# ATTENDANCE MANAGEMENT
#########################################################

attendance.minimum-working-hours=8

attendance.half-day-hours=4


#########################################################
# LEAVE MANAGEMENT
#########################################################

leave.monthly-paid-leaves=2

leave.maximum-paid-leaves=24


#########################################################
# WALLET MANAGEMENT
#########################################################

wallet.minimum-balance=0


#########################################################
# PERFORMANCE MANAGEMENT
#########################################################

performance.audit.days=15


#########################################################
# LIVE LOCATION CONFIGURATION
#########################################################

gps.enabled=true

gps.refresh.seconds=30


#########################################################
# SCHEDULER CONFIGURATION
#########################################################

salary.schedule.day=30

attendance.report.schedule=23:59

audit.report.days=15


#########################################################
# NOTIFICATION CONFIGURATION
#########################################################

notifications.enabled=true

email.notifications.enabled=true

push.notifications.enabled=true


#########################################################
# DOCUMENT MANAGEMENT
#########################################################

documents.allowed-types=pdf,jpg,jpeg,png

documents.maximum-size=20MB


#########################################################
# COMPANY DETAILS
#########################################################

company.name=QuickDine

company.email=${COMPANY_EMAIL}

company.mobile=${COMPANY_MOBILE}

company.website=${COMPANY_WEBSITE}


#########################################################
# TIMEZONE CONFIGURATION
#########################################################

spring.jackson.time-zone=Asia/Kolkata

//spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Kolkata


#########################################################
# END OF CONFIGURATION
#########################################################
```
